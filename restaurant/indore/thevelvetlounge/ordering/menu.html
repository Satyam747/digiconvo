<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Menu</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>

<script src="common.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#05070f;

font-family:system-ui,sans-serif;

color:white;

padding-bottom:90px;

}

.wrapper{

max-width:480px;

margin:auto;

background:#0b0f19;

min-height:100vh;

}

.header{

background:#141b2d;

padding:20px;

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:1px solid #202b49;

}

.customer h2{

font-size:20px;

}

.customer p{

font-size:13px;

color:#10b981;

margin-top:4px;

}

.table{

padding:8px 14px;

border:1px solid #c5a880;

border-radius:8px;

color:#c5a880;

font-weight:bold;

}

.search{

padding:15px;

}

.search input{

width:100%;

padding:14px;

border-radius:12px;

border:none;

background:#05070f;

color:white;

font-size:15px;

outline:none;

}

.categories{

display:flex;

overflow-x:auto;

padding:0 15px 10px;

gap:10px;

}

.categories::-webkit-scrollbar{

display:none;

}

.category{

padding:10px 18px;

background:#141b2d;

border-radius:100px;

cursor:pointer;

white-space:nowrap;

font-size:14px;

}

.category.active{

background:#c5a880;

color:#05070f;

font-weight:bold;

}

.products{

padding:15px;

}

.card{

background:#141b2d;

border-radius:16px;

margin-bottom:18px;

overflow:hidden;

display:flex;

gap:15px;

padding:15px;

}

.card img{

width:95px;

height:95px;

object-fit:cover;

border-radius:10px;

background:#222;

}

.info{

flex:1;

display:flex;

flex-direction:column;

}

.name{

font-size:18px;

font-weight:bold;

margin-bottom:6px;

}

.desc{

font-size:13px;

color:#9ca3af;

margin-bottom:8px;

}

.price{

font-size:18px;

font-weight:bold;

color:#c5a880;

}

.oldPrice{

font-size:13px;

text-decoration:line-through;

color:#888;

margin-right:8px;

}

.badges{

margin-bottom:8px;

display:flex;

gap:6px;

flex-wrap:wrap;

}

.badge{

padding:3px 8px;

font-size:11px;

border-radius:20px;

}

.veg{

background:#14532d;

}

.nonveg{

background:#7f1d1d;

}

.offer{

background:#dc2626;

}

.out{

background:#555;

}

.action{

margin-top:auto;

display:flex;

justify-content:flex-end;

}

.addBtn{

background:#c5a880;

border:none;

padding:9px 18px;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}

.stepper{

display:flex;

align-items:center;

gap:12px;

background:#c5a880;

padding:6px 10px;

border-radius:10px;

}

.stepper button{

background:none;

border:none;

font-size:20px;

cursor:pointer;

font-weight:bold;

}

.cartBar{

position:fixed;

left:50%;

bottom:15px;

transform:translateX(-50%);

width:calc(100% - 30px);

max-width:450px;

background:#10b981;

padding:16px;

border-radius:14px;

display:none;

justify-content:space-between;

align-items:center;

color:#05070f;

font-weight:bold;

cursor:pointer;

box-shadow:0 10px 25px rgba(0,0,0,.5);

}

.loading{

padding:100px;

text-align:center;

color:#888;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="header">

<div class="customer">

<h2 id="customerName">

Loading...

</h2>

<p id="restaurantName">

Loading...

</p>

</div>

<div
class="table"
id="tableNo">

Table

</div>

</div>

<div class="search">

<input

id="searchBox"

placeholder="Search dishes...">

</div>

<div
class="categories"
id="categories">

</div>

<div
class="products"
id="products">

<div class="loading">

Loading Menu...

</div>

</div>

</div>

<div
class="cartBar"
id="cartBar">

<div>

<div id="cartItems">

0 Items

</div>

<div id="cartTotal">

₹0

</div>

</div>

<div>

View Cart

<i class="fa-solid fa-arrow-right"></i>

</div>

</div>
<script>

let MENU = [];

let FILTERED = [];

let ACTIVE_CATEGORY = "";

document.addEventListener("DOMContentLoaded", async () => {

    requireSession();

    await loadRestaurantSettings();

    initializeMenu();

});


/*=========================================================
INITIALIZE
=========================================================*/

async function initializeMenu(){

    const customer = getCustomer();

    document.getElementById("customerName").innerText =
        customer.name;

    document.getElementById("tableNo").innerText =
        "Table " + customer.table;

    document.getElementById("restaurantName").innerText =
        SETTINGS.Name || CONFIG.RESTAURANT.NAME;

    await loadMenu();

    document
    .getElementById("searchBox")
    .addEventListener("input", searchMenu);

    document
    .getElementById("cartBar")
    .onclick=function(){

        location.href=CONFIG.ROUTES.CHECKOUT;

    };

}


/*=========================================================
LOAD MENU
=========================================================*/

async function loadMenu(){

    const result=await fetchMenu();

    if(!result.success){

        document.getElementById("products").innerHTML=
        "<div class='loading'>Unable to load menu.</div>";

        return;

    }

    MENU=result.data;

    FILTERED=[...MENU];

    buildCategories();

    renderProducts();

    updateCartBar();

}


/*=========================================================
CATEGORY ENGINE
=========================================================*/

function buildCategories(){

    const holder=document.getElementById("categories");

    holder.innerHTML="";

    const categories=[
        ...new Set(
            MENU.map(item=>item.category)
        )
    ];

    ACTIVE_CATEGORY=categories[0];

    categories.forEach(category=>{

        const div=document.createElement("div");

        div.className="category";

        if(category===ACTIVE_CATEGORY){

            div.classList.add("active");

        }

        div.innerText=category;

        div.onclick=function(){

            ACTIVE_CATEGORY=category;

            document
            .querySelectorAll(".category")
            .forEach(x=>x.classList.remove("active"));

            div.classList.add("active");

            renderProducts();

        };

        holder.appendChild(div);

    });

}


/*=========================================================
SEARCH
=========================================================*/

function searchMenu(){

    renderProducts();

}
/*=========================================================
PRODUCT RENDERING
=========================================================*/

function renderProducts(){

    const container=document.getElementById("products");

    container.innerHTML="";

    const keyword=document
        .getElementById("searchBox")
        .value
        .trim()
        .toLowerCase();

            FILTERED=MENU.filter(item=>{

        const categoryMatch = (keyword !== "") ? true : item.category === ACTIVE_CATEGORY;

        const searchMatch=

            item.name.toLowerCase().includes(keyword)
            ||
            (item.description||"")
            .toLowerCase()
            .includes(keyword);

        return categoryMatch && searchMatch;
    });


    if(FILTERED.length===0){

        container.innerHTML=

        "<div class='loading'>No Items Found</div>";

        return;

    }

    FILTERED.forEach(item=>{

        container.appendChild(

            createProductCard(item)

        );

    });

}


/*=========================================================
PRODUCT CARD
=========================================================*/

function createProductCard(item){

    const card=document.createElement("div");

    card.className="card";

    const qty=getCartQuantity(item.id);

    const hasDiscount=

        Number(item.originalPrice)>

        Number(item.price);

    let badges="";

    if(item.type==="Veg"){

        badges+=

        "<span class='badge veg'>VEG</span>";

    }

    if(item.type==="Non Veg"){

        badges+=

        "<span class='badge nonveg'>NON VEG</span>";

    }

    if(hasDiscount){

        badges+=

        "<span class='badge offer'>Special Discount</span>";

    }

    if(item.available==="No"){

        badges+=

        "<span class='badge out'>Out of Stock</span>";

    }

    let action="";

    if(item.available==="No"){

        action=

        "<button class='addBtn' disabled>Unavailable</button>";

    }

    else if(qty===0){

        action=

        `<button
            class="addBtn"
            onclick="addItem('${item.id}')">
            ADD
        </button>`;

    }

    else{

        action=

        `<div class="stepper">

            <button
            onclick="minusItem('${item.id}')">

            −

            </button>

            <span>

            ${qty}

            </span>

            <button
            onclick="plusItem('${item.id}')">

            +

            </button>

        </div>`;

    }

    card.innerHTML=`

        <img
        src="${imageOrDefault(item.image)}">

                <div class="info">

            <div class="name">

                ${escapeHTML(item.name)}

            </div>

            <div class="badges">

                ${badges}

            </div>

            <div class="desc">

                ${escapeHTML(item.description||"")}

            </div>


            <div class="price">

                ${
                    hasDiscount
                    ?

                    `<span class="oldPrice">

                    ${formatMoney(item.originalPrice)}

                    </span>`

                    :""

                }

                ${formatMoney(item.price)}

            </div>

            <div class="action">

                ${action}

            </div>

        </div>

    `;

    return card;

}


/*=========================================================
CART BUTTONS
=========================================================*/

function addItem(id){

    const item=

    MENU.find(x=>x.id===id);

    addToCart(item);

    renderProducts();

    updateCartBar();

}

function plusItem(id){

    increaseQty(id);

    renderProducts();

    updateCartBar();

}

function minusItem(id){

    decreaseQty(id);

    renderProducts();

    updateCartBar();

}


/*=========================================================
FLOATING CART
=========================================================*/

function updateCartBar(){

    const count=cartItemCount();

    const total=getGrandTotal();

    const bar=document.getElementById("cartBar");

    if(count===0){

        bar.style.display="none";

        return;

    }

    bar.style.display="flex";

    document.getElementById("cartItems")

        .innerText=

        count+

        (count===1

        ?" Item"

        :" Items");

    document.getElementById("cartTotal")

        .innerText=

        formatMoney(total);

}

</script>

</body>

</html>
