<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Order Placed</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>

<script src="common.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#05070f;

font-family:system-ui,sans-serif;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:20px;

color:#fff;

}

.container{

max-width:520px;

width:100%;

background:#0b0f19;

border-radius:20px;

padding:35px;

border:1px solid #1e2640;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,.5);

}

.icon{

width:100px;

height:100px;

margin:auto;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

background:#10b98122;

border:2px solid #10b981;

font-size:45px;

color:#10b981;

margin-bottom:25px;

}

h1{

font-size:30px;

margin-bottom:10px;

}

.subtitle{

color:#94a3b8;

font-size:15px;

line-height:1.6;

margin-bottom:30px;

}

.card{

background:#141b2d;

border-radius:14px;

padding:20px;

margin-bottom:25px;

text-align:left;

}

.row{

display:flex;

justify-content:space-between;

margin-bottom:15px;

}

.row:last-child{

margin-bottom:0;

}

.label{

color:#94a3b8;

font-size:14px;

}

.value{

font-weight:bold;

color:#fff;

}

.total{

color:#c5a880;

font-size:20px;

}

.status{

display:inline-block;

padding:8px 18px;

background:#f59e0b22;

border:1px solid #f59e0b;

border-radius:30px;

font-weight:bold;

color:#f59e0b;

margin-bottom:25px;

}

.btn{

width:100%;

padding:16px;

border:none;

border-radius:12px;

background:#10b981;

color:#05070f;

font-size:17px;

font-weight:bold;

cursor:pointer;

margin-bottom:15px;

}

.secondary{

background:#141b2d;

color:white;

}

</style>

</head>

<body>

<div class="container">

<div class="icon">

<i class="fa-solid fa-check"></i>

</div>

<h1>

Order Placed

</h1>

<p class="subtitle">

Your order has been received successfully and sent to the kitchen.

</p>

<div
class="status"
id="orderStatus">

Pending

</div>

<div class="card">

<div class="row">

<span class="label">

Order ID

</span>

<span
class="value"
id="orderId">

--

</span>

</div>

<div class="row">

<span class="label">

Guest

</span>

<span
class="value"
id="guestName">

--

</span>

</div>

<div class="row">

<span class="label">

Table

</span>

<span
class="value"
id="tableNo">

--

</span>

</div>

<div class="row">

<span class="label">

Payment

</span>

<span
class="value"
id="paymentMode">

--

</span>

</div>

<div class="row">

<span class="label">

Total

</span>

<span
class="value total"
id="grandTotal">

₹0

</span>

</div>

</div>

<button 
class="btn" 
id="whatsappBtn" 
style="background:#25d366; color:white; display:none; margin-bottom:15px;" 
onclick="openWhatsApp()">
<i class="fa-brands fa-whatsapp"></i> Send via WhatsApp
</button>

<button
class="btn secondary"
id="trackButton">
Track Order Status
</button>

<button
class="btn secondary"
onclick="startNewOrder()">
New Order
</button>


</div>
<script>

/*=========================================================
INITIALIZE
=========================================================*/

document.addEventListener("DOMContentLoaded", async () => {

    requireSession();

    await loadRestaurantSettings();

    loadOrderDetails();

    initializeButtons();

    startStatusPolling();

});


/*=========================================================
LOAD ORDER
=========================================================*/

function loadOrderDetails(){
    loadSession();

    document.getElementById("orderId").innerText = SESSION.order.id;
    document.getElementById("guestName").innerText = SESSION.customer.name;
    document.getElementById("tableNo").innerText = SESSION.customer.table;
    document.getElementById("paymentMode").innerText = SESSION.order.paymentMode;
    document.getElementById("grandTotal").innerText = formatMoney(SESSION.order.total);

    updateStatusBadge(SESSION.order.status || "Pending");

    // Show WhatsApp button only if configured in Dashboard Settings
    if(SETTINGS.WhatsApp && SETTINGS.WhatsApp.trim() !== ""){
        document.getElementById("whatsappBtn").style.display = "block";
    }
}

/*=========================================================
START NEW ORDER safely
=========================================================*/
function startNewOrder(){
    clearCart();
    location.href = CONFIG.ROUTES.INDEX;
}



/*=========================================================
BUTTONS
=========================================================*/

function initializeButtons(){

    document
    .getElementById("trackButton")
    .addEventListener(
        "click",
        refreshOrderStatus
    );

}


/*=========================================================
STATUS POLLING
=========================================================*/
let STATUS_POLL; 

function startStatusPolling(){
    refreshOrderStatus();
    STATUS_POLL = setInterval(refreshOrderStatus, 5000);
}

async function refreshOrderStatus(){
    if(!SESSION.order.id){ return; }
    
    const response = await api("getOrderStatus", { orderId:SESSION.order.id });
    if(!response.success){ return; }

    if(response.status !== SESSION.order.status){
        SESSION.order.status = response.status;
        saveSession();
        updateStatusBadge(response.status);
        
                // Let the phone keep tracking while they eat (Remove "Served")
        const terminalStates = ["Completed", "Cancelled"];
        if(terminalStates.includes(response.status)){
            clearInterval(STATUS_POLL);
        }

    }
}

/*=========================================================
STATUS UI
=========================================================*/
function updateStatusBadge(status){
    const badge = document.getElementById("orderStatus");
    badge.innerText = status;
    badge.style.background = "#141b2d";
    badge.style.borderColor = "#1e2640";
    badge.style.color = "#ffffff";

    switch(status.toLowerCase()){
        case "pending":
            badge.style.background = "#f59e0b22";
            badge.style.borderColor = "#f59e0b";
            badge.style.color = "#f59e0b";
            break;
        case "preparing":
            badge.style.background = "#3b82f622";
            badge.style.borderColor = "#3b82f6";
            badge.style.color = "#3b82f6";
            break;
        case "ready":
            badge.style.background = "#10b98122";
            badge.style.borderColor = "#10b981";
            badge.style.color = "#10b981";
            break;
                case "served":
        case "fulfilled":
            badge.style.background = "#10b98122";
            badge.style.borderColor = "#10b981";
            badge.style.color = "#10b981";
            document.querySelector(".icon").innerHTML = '<i class="fa-solid fa-circle-check"></i>';
            document.querySelector("h1").innerText = "Enjoy Your Meal!";
            break;
        case "completed":
            badge.style.background = "#a855f722";
            badge.style.borderColor = "#a855f7";
            badge.style.color = "#a855f7";
            document.querySelector(".icon").innerHTML = '<i class="fa-solid fa-receipt"></i>';
            document.querySelector("h1").innerText = "Payment Received. Thank You!";
            break;

        case "cancelled":
            badge.style.background = "#ef444422";
            badge.style.borderColor = "#ef4444";
            badge.style.color = "#ef4444";
            document.querySelector(".icon").innerHTML = '<i class="fa-solid fa-xmark"></i>';
            document.querySelector("h1").innerText = "Order Cancelled";
            break;
    }
}


</script>

</body>

</html>
