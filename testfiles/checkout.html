<style>

/*=========================================================
PART 2 CSS WILL COME HERE
=========================================================*/
/*=========================================================
GLOBAL
=========================================================*/

margin:0;

padding:0;

box-sizing:border-box;

font-family:

/*=========================================================

}

margin-bottom:8px;

}

/*=========================================================
CUSTOMER
=========================================================*/

.customerCard{

display:flex;

justify-content:space-between;

padding:20px 25px;

background:#141b2d;

border-bottom:1px solid #24304d;

}

.customerCard b{

display:block;

margin-bottom:6px;

color:#c5a880;

}

/*=========================================================
CART
=========================================================*/

.cartItems{

padding:20px 25px;

}

.cartItem{

display:flex;

justify-content:space-between;

align-items:center;

padding:15px 0;

border-bottom:1px solid #24304d;

gap:15px;

}

.itemInfo{

flex:1;

}

.itemName{

font-weight:bold;

font-size:17px;

margin-bottom:4px;

}

.itemPrice{

color:#c5a880;

font-size:14px;

}

.itemQty{

background:#141b2d;

padding:6px 12px;

border-radius:8px;

font-weight:bold;

}

/*=========================================================
SUMMARY
=========================================================*/

.summaryCard{

margin:20px;

padding:20px;

background:#141b2d;

border-radius:14px;

border:1px solid #24304d;

}

.row{

display:flex;

justify-content:space-between;

margin-bottom:12px;

}

.row:last-child{

margin-bottom:0;

}

.summaryCard hr{

border:none;

border-top:1px solid #293552;

margin:15px 0;

}

.total{

font-size:20px;

font-weight:bold;

color:#c5a880;

}

/*=========================================================
PAYMENT
=========================================================*/

.paymentCard{

margin:20px;

padding:20px;

background:#141b2d;

border-radius:14px;

border:1px solid #24304d;

}

.paymentCard h3{

margin-bottom:15px;

}

.paymentCard label{

display:flex;

align-items:center;

gap:10px;

padding:12px 0;

cursor:pointer;

}

/*=========================================================
BUTTON
=========================================================*/

.placeButton{

width:calc(100% - 40px);

margin:0 20px 20px;

padding:16px;

border:none;

border-radius:12px;

background:#10b981;

color:#05070f;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

.placeButton:hover{

transform:translateY(-2px);

}

/*=========================================================
EMPTY CART
=========================================================*/

.empty{

padding:60px 20px;

text-align:center;

color:#94a3b8;

font-size:18px;

}

/*=========================================================
RESPONSIVE
=========================================================*/

@media(max-width:600px){

.customerCard{

flex-direction:column;

gap:15px;

}

}

<body>

<div class="header">

Please verify your order before placing it.

</p>

</div>

<div class="customerCard">

<div>

<b>

Customer

</b>

<div id="customerName">

--

</div>

</div>

<div>

<b>

Table

</b>

<div id="tableNumber">

--

</div>

</div>

</div>

<div
id="cartItems"
class="cartItems">

</div>

<div class="summaryCard">

<div class="row">

<span>

Subtotal

</span>

<span
id="subtotal">

₹0.00

</span>

</div>

<div class="row">

<span>

Discount

</span>

<span
id="discount">

₹0.00

</span>

</div>

<div class="row">

<span>

GST

</span>

<span
id="gst">

₹0.00

</span>

</div>

<hr>

<div
class="row total">

<span>

Grand Total

</span>

<span
id="grandTotal">

₹0.00

</span>

</div>

</div>
<div class="paymentCard">
    <h3>Cooking Instructions</h3>
    <textarea id="orderNotes" maxlength="150" placeholder="E.g., Make it less spicy, allergy to peanuts, no onions..." style="width:100%; padding:12px; border-radius:10px; border:1px solid #293552; background:#141b2d; color:white; resize:vertical; min-height:80px;"></textarea>
</div>

<div class="paymentCard">
    <h3>Payment Method</h3>
    <p style="color:#94a3b8; font-size:15px; line-height:1.5; margin-top:8px;">
        You are welcome to pay at the counter after your meal. We accept Multiple Payment options.
    </p>
</div>


<button
id="placeOrderButton"
class="placeButton">

Place Order

</button>

</div>

<script>

/*=========================================================
PART 3 JAVASCRIPT WILL COME HERE
=========================================================*/
"use strict";

/*=========================================================
GLOBAL
=========================================================*/

let ORDER={};

/*=========================================================
INITIALIZE
=========================================================*/

document.addEventListener("DOMContentLoaded", async()=>{
    requireSession();
    requireCart();
    await loadRestaurantSettings();
    await initializeCheckout();   // <-- add await
});

/*=========================================================
STARTUP
=========================================================*/
async function syncActiveOrderId() {
    const table = SESSION.customer.table;
    if (!table) return;
    const active = await getActiveOrderForTable(table);
    if (active) {
        SESSION.order.id = active.id;
        SESSION.order.status = active.status;
        SESSION.order.subtotal = active.subtotal;
        SESSION.order.discount = active.discount;
        SESSION.order.gst = active.gst;
        SESSION.order.total = active.total;
        SESSION.order.notes = active.notes || "";
        SESSION.order.createdAt = active.created_at;
        // Only load cart from DB if local cart is empty (to preserve new additions)
        if (SESSION.cart.length === 0) {
            SESSION.cart = active.cart || [];
        }
        saveSession();
    }
}

async function initializeCheckout(){
    await syncActiveOrderId();   // <-- ADD THIS LINE
    loadCustomer();
    renderCart();
    initializePayment();
    initializeButtons();
}

/*=========================================================
CUSTOMER
=========================================================*/

function loadCustomer(){

    const customer=

    getCustomer();

    document

    .getElementById(

    "customerName"

    )

    .innerText=

    customer.name;

    document

    .getElementById(

    "tableNumber"

    )

    .innerText=

    customer.table;

}

/*=========================================================
PAYMENT
=========================================================*/

function initializePayment(){
    // Options removed from UI; default to counter payment
    setPaymentMode("Pay at Counter");
}


/*=========================================================
BUTTON
=========================================================*/

function initializeButtons(){

    document

    .getElementById(

    "placeOrderButton"

    )

    .onclick=

    placeOrder;

}
/*=========================================================
RENDER CART
=========================================================*/
function renderCart(){
    ORDER = getOrderSummary();
    const container = document.getElementById("cartItems");
    container.innerHTML = "";
    const placeBtn = document.getElementById("placeOrderButton");
    
    if(ORDER.cart.length === 0){
        container.innerHTML = '<div class="empty">Your cart is empty.</div>';
        placeBtn.disabled = true;
        placeBtn.style.opacity = "0.5";
        updateSummary();
        return;
    }
    
    placeBtn.disabled = false;
    placeBtn.style.opacity = "1";

    const isExistingOrder = SESSION.order.id && SESSION.order.id !== "";

    ORDER.cart.forEach(item => {
        const itemDiv = document.createElement("div");
        itemDiv.className = "cartItem";
        
        const isNew = item.isNew === true;
        const canEdit = !isExistingOrder || isNew;
        
        // Item info
        const infoDiv = document.createElement("div");
        infoDiv.className = "itemInfo";
        let itemNameHtml = item.name;
        if (isNew) {
            itemNameHtml += ' <span style="background:#22c55e; color:#05070f; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:bold;">🆕 New</span>';
        }
        infoDiv.innerHTML = `
            <div class="itemName">${itemNameHtml}</div>
            <div class="itemPrice">${formatMoney(item.price)}</div>
        `;
        
        // Controls
        const controlsDiv = document.createElement("div");
        controlsDiv.style.display = "flex";
        controlsDiv.style.alignItems = "center";
        controlsDiv.style.gap = "8px";
        
        if (canEdit) {
            const minusBtn = document.createElement("button");
            minusBtn.innerText = "−";
            minusBtn.className = "qtyBtn";
            minusBtn.style.cssText = "background:#141b2d; color:white; border:1px solid #293552; border-radius:8px; width:30px; height:30px; font-size:20px; cursor:pointer;";
            minusBtn.onclick = () => {
    decreaseQty(item.cartItemId);
    renderCart();
};
            
            const qtySpan = document.createElement("span");
            qtySpan.className = "itemQty";
            qtySpan.innerText = `× ${item.qty}`;
            
            const plusBtn = document.createElement("button");
            plusBtn.innerText = "+";
            plusBtn.className = "qtyBtn";
            plusBtn.style.cssText = "background:#141b2d; color:white; border:1px solid #293552; border-radius:8px; width:30px; height:30px; font-size:20px; cursor:pointer;";
            plusBtn.onclick = () => {
    increaseQty(item.cartItemId);
    renderCart();
};
            
            const removeBtn = document.createElement("button");
            removeBtn.innerText = "✕";
            removeBtn.className = "removeBtn";
            removeBtn.style.cssText = "background:#dc2626; color:white; border:none; border-radius:8px; width:30px; height:30px; font-size:16px; cursor:pointer;";
            removeBtn.onclick = () => {
    removeFromCart(item.cartItemId);
    renderCart();
};
            
            controlsDiv.appendChild(minusBtn);
            controlsDiv.appendChild(qtySpan);
            controlsDiv.appendChild(plusBtn);
            controlsDiv.appendChild(removeBtn);
        } else {
            // Old item: show quantity only with lock icon
            controlsDiv.innerHTML = `
                <span style="color:#94a3b8;">× ${item.qty}</span>
                <span style="color:#94a3b8; font-size:14px;"><i class="fa-solid fa-lock"></i></span>
            `;
        }
        
        itemDiv.appendChild(infoDiv);
        itemDiv.appendChild(controlsDiv);
        container.appendChild(itemDiv);
    });
    
    // Show a note if there are old items that cannot be edited
    const hasOldItems = ORDER.cart.some(item => item.isNew !== true);
    if (hasOldItems && isExistingOrder) {
        const note = document.createElement("div");
        note.style.cssText = "padding:12px 0; color:#94a3b8; font-size:13px; border-top:1px solid #24304d; margin-top:10px;";
        note.innerText = "🔒 Existing items cannot be modified. You can only adjust new additions.";
        container.appendChild(note);
    }
    
    updateSummary();
}

/*=========================================================
SUMMARY
=========================================================*/

function updateSummary(){

    calculateBill();

    document

    .getElementById(

        "subtotal"

    )

    .innerText=

    formatMoney(

        SESSION.order.subtotal

    );

    document

    .getElementById(

        "discount"

    )

    .innerText=

    formatMoney(

        SESSION.order.discount

    );

    document

    .getElementById(

        "gst"

    )

    .innerText=

    formatMoney(

        SESSION.order.gst

    );

    document

    .getElementById(

        "grandTotal"

    )

    .innerText=

    formatMoney(

        SESSION.order.total

    );

}
/*=========================================================
PLACE ORDER
=========================================================*/
async function placeOrder() {
    const notesText = document.getElementById("orderNotes").value.trim();
    calculateBill();
    SESSION.order.notes = notesText;

    const button = document.getElementById("placeOrderButton");
    button.disabled = true;
    button.innerText = "Placing Order...";

    try {
        // --- Check for existing active order ---
        const activeOrder = await getActiveOrderForTable(SESSION.customer.table);
        const isAdditional = !!activeOrder;
        const orderId = activeOrder ? activeOrder.id : SESSION.order.id;

        const response = await api("placeOrder", {
            customer: SESSION.customer,
            cart: SESSION.cart,
            order: { ...SESSION.order, id: orderId },
            isAdditionalOrder: isAdditional
        });

        if (!response.success) {
    alert(response.message || "Unable to place order.");
    button.disabled = false;
    button.innerText = "Place Order";
    return;
}

// Recalculate and save local session with the updated totals
calculateBill();
saveSession();

orderPlaced();
goTo(CONFIG.ROUTES.SUCCESS);
    } catch (error) {
        console.error(error);
        alert("Something went wrong.");
        button.disabled = false;
        button.innerText = "Place Order";
    }
}
/*=========================================================
ORDER SUCCESS
=========================================================*/

function orderPlaced(){
    // Removed clearCart() so the success page can access the cart items for WhatsApp
    saveSession();
}



/*=========================================================
PAGE VISIBILITY
=========================================================*/

document.addEventListener(

"visibilitychange",

()=>{

    if(

        !document.hidden

    ){

        renderCart();

    }

}
);
/*=========================================================
PAGE READY
=========================================================*/

console.log(

"Checkout Page Loaded"

);

</script>

</body>
