<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>

Digiconvo Restaurant Dashboard

</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script src="config.js"></script>

<script src="common.js"></script>

<style>

/*==============================
PART 2 CSS WILL COME HERE
==============================*/
/*=========================================================
GLOBAL
=========================================================*/

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:

system-ui,

Segoe UI,

sans-serif;

}

html{

height:100%;

}

body{

height:100%;

background:#05070f;

color:white;

overflow:hidden;

display:flex;

}

a{

color:inherit;

text-decoration:none;

}

button{

font-family:inherit;

}

input,

select,

textarea{

font-family:inherit;

font-size:15px;

outline:none;

}

/*=========================================================
SCROLLBAR
=========================================================*/

::-webkit-scrollbar{

width:10px;

height:10px;

}

::-webkit-scrollbar-track{

background:#0b0f19;

}

::-webkit-scrollbar-thumb{

background:#2d3a5a;

border-radius:20px;

}

::-webkit-scrollbar-thumb:hover{

background:#46567f;

}

/*=========================================================
SIDEBAR
=========================================================*/

.sidebar{

width:260px;

background:#0b0f19;

border-right:1px solid #1f2940;

display:flex;

flex-direction:column;

flex-shrink:0;

}

.logo{

padding:25px;

border-bottom:1px solid #1f2940;

text-align:center;

}

.logo h2{

font-size:24px;

font-weight:700;

margin-bottom:6px;

}

.logo p{

font-size:12px;

color:#94a3b8;

}

.menu{

flex:1;

overflow-y:auto;

padding:15px;

}

.navItem{

display:flex;

align-items:center;

gap:15px;

padding:14px 16px;

border-radius:12px;

margin-bottom:8px;

cursor:pointer;

transition:.25s;

font-size:15px;

}

.navItem:hover{

background:#141b2d;

}

.navItem.active{

background:#c5a880;

color:#05070f;

font-weight:bold;

}

.navItem i{

width:22px;

text-align:center;

font-size:18px;

}

/*=========================================================
MAIN
=========================================================*/

.main{

flex:1;

display:flex;

flex-direction:column;

overflow:hidden;

}

/*=========================================================
TOPBAR
=========================================================*/

.topbar{

height:70px;

background:#0b0f19;

border-bottom:1px solid #1f2940;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 25px;

flex-shrink:0;

}

.restaurantTitle{

font-size:24px;

font-weight:bold;

}

.ownerArea{

display:flex;

align-items:center;

gap:18px;

}

.ownerCircle{

width:42px;

height:42px;

border-radius:50%;

background:#c5a880;

display:flex;

justify-content:center;

align-items:center;

color:#05070f;

font-weight:bold;

font-size:18px;

}

/*=========================================================
PAGES
=========================================================*/

.page{

flex:1;

overflow:auto;

padding:25px;

display:none;

animation:fade .25s;

}

.page.active{

display:block;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(8px);

}

to{

opacity:1;

transform:none;

}

}

/*=========================================================
HEADERS
=========================================================*/

.sectionHeader{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

gap:15px;

flex-wrap:wrap;

}

.sectionHeader h2{

font-size:28px;

}

/*=========================================================
BUTTONS
=========================================================*/

.primaryButton{

background:#c5a880;

border:none;

color:#05070f;

padding:12px 22px;

border-radius:10px;

font-weight:bold;

cursor:pointer;

transition:.2s;

}

.primaryButton:hover{

transform:translateY(-2px);

}

.secondaryButton{

background:#293552;

border:none;

color:white;

padding:12px 22px;

border-radius:10px;

cursor:pointer;

}

.secondaryButton:hover{

background:#394a74;

}

/*=========================================================
CARDS
=========================================================*/

.panel{

background:#0b0f19;

border:1px solid #24304d;

border-radius:16px;

padding:22px;

}

.panel h3{

margin-bottom:18px;

}

/*=========================================================
STATS
=========================================================*/

.statsGrid{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}

.statCard{

background:#0b0f19;

border:1px solid #24304d;

border-radius:16px;

padding:22px;

display:flex;

align-items:center;

gap:18px;

transition:.25s;

}

.statCard:hover{

transform:translateY(-4px);

border-color:#c5a880;

}

.statCard i{

font-size:28px;

color:#c5a880;

}

.statCard h3{

font-size:30px;

margin-bottom:4px;

}

.statCard p{

font-size:13px;

color:#94a3b8;

}

/*=========================================================
DASHBOARD GRID
=========================================================*/

.dashboardGrid{

display:grid;

grid-template-columns:2fr 1fr;

gap:20px;

margin-top:20px;

}

/*=========================================================
UTILITY
=========================================================*/

.hidden{

display:none!important;

}

.textCenter{

text-align:center;

}

.mt10{

margin-top:10px;

}

.mt20{

margin-top:20px;

}

.mb20{

margin-bottom:20px;

}
/*=========================================================
TOOLBAR
=========================================================*/

.toolbar{

display:flex;

flex-wrap:wrap;

gap:15px;

margin-bottom:25px;

}

.toolbar input,

.toolbar select{

background:#0b0f19;

border:1px solid #293552;

color:white;

padding:12px 14px;

border-radius:10px;

min-width:220px;

}

.toolbar input:focus,

.toolbar select:focus{

border-color:#c5a880;

}

/*=========================================================
MENU GRID
=========================================================*/

.menuGrid{

display:grid;

grid-template-columns:

repeat(auto-fill,minmax(330px,1fr));

gap:20px;

}

/*=========================================================
MENU CARD
=========================================================*/

.menuCard{

background:#0b0f19;

border:1px solid #24304d;

border-radius:16px;

overflow:hidden;

transition:.25s;

}

.menuCard:hover{

transform:translateY(-4px);

border-color:#c5a880;

}

.menuImage{

height:190px;

background:#141b2d;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

}

.menuImage img{

width:100%;

height:100%;

object-fit:cover;

transition:.3s;

}

.menuCard:hover .menuImage img{

transform:scale(1.05);

}

.menuBody{

padding:18px;

}

.menuBody h3{

font-size:22px;

margin-bottom:8px;

}

.menuBody p{

font-size:14px;

line-height:1.6;

color:#b6becd;

min-height:45px;

}

.price{

margin:14px 0;

font-size:24px;

font-weight:bold;

color:#c5a880;

}

/*=========================================================
BADGES
=========================================================*/

.badge{

display:inline-block;

padding:6px 12px;

border-radius:25px;

font-size:12px;

font-weight:bold;

margin-right:8px;

margin-bottom:8px;

}

.available{

background:#14532d;

color:white;

}

.unavailable{

background:#991b1b;

color:white;

}

.offerBadge{

background:#2563eb;

color:white;

}

/*=========================================================
CARD BUTTONS
=========================================================*/

.cardActions{

display:grid;

grid-template-columns:

repeat(4,1fr);

gap:10px;

margin-top:18px;

}

.cardActions button{

border:none;

padding:10px;

border-radius:8px;

cursor:pointer;

font-size:13px;

font-weight:bold;

transition:.2s;

}

.cardActions button:hover{

transform:translateY(-2px);

}

.editBtn{

background:#2563eb;

color:white;

}

.offerBtn{

background:#f59e0b;

color:white;

}

.stockBtn{

background:#16a34a;

color:white;

}

.deleteBtn{

background:#dc2626;

color:white;

}

/*=========================================================
MODAL
=========================================================*/

.modal{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,.65);

display:none;

justify-content:center;

align-items:center;

z-index:9999;

padding:20px;

}

.modal.show{

display:flex;

}

.modalBox{

width:720px;

max-width:100%;

background:#0b0f19;

border:1px solid #24304d;

border-radius:18px;

overflow:hidden;

animation:fade .2s;

}

.modalHeader{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 24px;

border-bottom:1px solid #24304d;

}

.modalHeader h2{

font-size:24px;

}

.closeButton{

background:none;

border:none;

color:white;

font-size:24px;

cursor:pointer;

}

.modalBody{

padding:24px;

}

.modalFooter{

display:flex;

justify-content:flex-end;

gap:12px;

margin-top:25px;

}

/*=========================================================
FORM
=========================================================*/

.formGrid{

display:grid;

grid-template-columns:1fr 1fr;

gap:18px;

}

.formGrid label{

display:block;

margin-bottom:8px;

font-weight:bold;

}

.formGrid input,

.formGrid textarea,

.formGrid select{

width:100%;

padding:12px;

border-radius:10px;

border:1px solid #293552;

background:#141b2d;

color:white;

}

.formGrid input:focus,

.formGrid textarea:focus,

.formGrid select:focus{

border-color:#c5a880;

}

.formGrid textarea{

resize:none;

height:90px;

}

.fullWidth{

grid-column:1/3;

}
/*=========================================================
KITCHEN DISPLAY SYSTEM
=========================================================*/

.kdsBoard{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
    align-items:start;
}


.kdsColumn{

background:#0b0f19;

border:1px solid #24304d;

border-radius:16px;

padding:16px;

min-height:650px;

}

.kdsTitle{

display:flex;

justify-content:space-between;

align-items:center;

font-size:18px;

font-weight:bold;

margin-bottom:20px;

padding-bottom:12px;

border-bottom:1px solid #24304d;

}

.kdsTitle span{

background:#141b2d;

padding:5px 10px;

border-radius:30px;

font-size:13px;

}

.pendingColor{

color:#f59e0b;

}

.preparingColor{

color:#3b82f6;

}

.readyColor{

color:#10b981;

}

.servedColor{
    color:#16a34a;
}
.completedColor{
    color:#a855f7;
}


/*=========================================================
ORDER CARD
=========================================================*/

.kdsItem{

background:#141b2d;

border:1px solid #293552;

border-radius:14px;

padding:15px;

margin-bottom:15px;

transition:.2s;

}

.kdsItem:hover{

border-color:#c5a880;

transform:translateY(-2px);

}

.kdsItem hr{

border:none;

border-top:1px solid #293552;

margin:12px 0;

}

.kdsItem b{

font-size:15px;

}

.kdsItem div{

line-height:1.7;

}

/*=========================================================
ORDER BUTTONS
=========================================================*/

.billBtn,

.kotBtn,

.prepareBtn,

.readyBtn,

.serveBtn,

.cancelBtn{

border:none;

border-radius:8px;

padding:10px;

font-weight:bold;

cursor:pointer;

transition:.2s;

}

.billBtn{

background:#2563eb;

color:white;

}

.kotBtn{

background:#7c3aed;

color:white;

}

.prepareBtn{

background:#0ea5e9;

color:white;

}

.readyBtn{

background:#16a34a;

color:white;

}

.serveBtn{

background:#15803d;

color:white;

}

.cancelBtn{

background:#dc2626;

color:white;

}

.billBtn:hover,

.kotBtn:hover,

.prepareBtn:hover,

.readyBtn:hover,

.serveBtn:hover,

.cancelBtn:hover{

transform:translateY(-2px);

}

/*=========================================================
ORDER SEARCH
=========================================================*/

#orderSearch{

width:260px;

padding:12px;

background:#141b2d;

border:1px solid #293552;

border-radius:10px;

color:white;

}

#orderSearch:focus{

border-color:#c5a880;

}

/*=========================================================
ORDER STATUS
=========================================================*/

.statusBadge{

display:inline-block;

padding:5px 12px;

border-radius:25px;

font-size:12px;

font-weight:bold;

}

.statusPending{

background:#92400e;

}

.statusPreparing{

background:#1d4ed8;

}

.statusReady{

background:#166534;

}

.statusServed{

background:#14532d;

}

.statusCancelled{

background:#991b1b;

}

/*=========================================================
PRIORITY
=========================================================*/

.priorityFresh{

color:#22c55e;

font-weight:bold;

}

.priorityAttention{

color:#f59e0b;

font-weight:bold;

}

.priorityUrgent{

color:#ef4444;

font-weight:bold;

}
/*=========================================================
TABLES
=========================================================*/

.tablesGrid{

display:grid;

grid-template-columns:

repeat(auto-fill,minmax(220px,1fr));

gap:20px;

}

.tableCard{

background:#0b0f19;

border:1px solid #24304d;

border-radius:16px;

padding:20px;

transition:.25s;

text-align:center;

}

.tableCard:hover{

transform:translateY(-4px);

border-color:#c5a880;

}

.tableCard h2{

font-size:34px;

margin-bottom:12px;

}

.tableStatus{

display:inline-block;

padding:6px 14px;

border-radius:30px;

font-size:13px;

font-weight:bold;

margin-bottom:15px;

}

.free{

background:#14532d;

color:white;

}

.busy{

background:#92400e;

color:white;

}

.billing{

background:#1d4ed8;

color:white;

}

.cleaning{

background:#4b5563;

color:white;

}

.tableCustomer{

margin-top:10px;

color:#cbd5e1;

min-height:24px;

}

.tableButtons{

display:grid;

gap:10px;

margin-top:18px;

}

/*=========================================================
REPORTS
=========================================================*/

.reportCards{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(240px,1fr));

gap:20px;

margin-bottom:25px;

}

.reportCard{

background:#0b0f19;

border:1px solid #24304d;

border-radius:16px;

padding:24px;

text-align:center;

}

.reportCard h4{

color:#94a3b8;

margin-bottom:12px;

}

.reportCard h2{

font-size:32px;

color:#c5a880;

}

.reportList{

margin-top:20px;

background:#0b0f19;

border:1px solid #24304d;

border-radius:16px;

padding:20px;

}

/*=========================================================
SETTINGS
=========================================================*/

.settingsGrid{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(360px,1fr));

gap:20px;

}

.settingCard{

background:#0b0f19;

border:1px solid #24304d;

border-radius:16px;

padding:22px;

}

.settingCard h3{

margin-bottom:20px;

}

.settingCard label{

display:block;

margin-top:15px;

margin-bottom:8px;

font-weight:bold;

}

.settingCard input,

.settingCard textarea,

.settingCard select{

width:100%;

padding:12px;

background:#141b2d;

border:1px solid #293552;

border-radius:10px;

color:white;

}

.settingCard textarea{

resize:vertical;

min-height:90px;

}

/*=========================================================
ACTIVITY
=========================================================*/

.activityCard{

background:#0b0f19;

border:1px solid #24304d;

border-radius:14px;

padding:18px;

margin-bottom:15px;

display:flex;

justify-content:space-between;

align-items:center;

gap:20px;

}

.activityLeft{

display:flex;

align-items:center;

gap:15px;

}

.activityIcon{

width:48px;

height:48px;

border-radius:50%;

background:#141b2d;

display:flex;

align-items:center;

justify-content:center;

font-size:18px;

color:#c5a880;

}

.activityTime{

font-size:13px;

color:#94a3b8;

white-space:nowrap;

}

/*=========================================================
TOAST
=========================================================*/

#toast{

position:fixed;

right:25px;

bottom:25px;

background:#16a34a;

color:white;

padding:14px 24px;

border-radius:10px;

font-weight:bold;

opacity:0;

pointer-events:none;

transform:translateY(25px);

transition:.3s;

z-index:999999;

}

#toast.show{

opacity:1;

transform:translateY(0);

}

/*=========================================================
LOADER
=========================================================*/

#globalLoader{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

display:none;

justify-content:center;

align-items:center;

background:rgba(0,0,0,.65);

z-index:999998;

}

.loaderBox{

background:#0b0f19;

border:1px solid #24304d;

border-radius:16px;

padding:30px;

text-align:center;

min-width:240px;

}

.spinner{

width:55px;

height:55px;

margin:auto;

margin-bottom:20px;

border:5px solid #293552;

border-top-color:#c5a880;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

to{

transform:rotate(360deg);

}

}

/*=========================================================
RESPONSIVE
=========================================================*/

@media(max-width:1200px){

.kdsBoard{

grid-template-columns:

repeat(2,1fr);

}

.dashboardGrid{

grid-template-columns:1fr;

}

}

@media(max-width:900px){

.sidebar{

width:80px;

}

.logo p,

.navItem span{

display:none;

}

.logo h2{

font-size:18px;

}

}

@media(max-width:768px){

body{

flex-direction:column;

overflow:auto;

}

.sidebar{

width:100%;

height:auto;

border-right:none;

border-bottom:1px solid #24304d;

}

.menu{

display:flex;

overflow-x:auto;

padding:10px;

}

.navItem{

margin-right:10px;

margin-bottom:0;

white-space:nowrap;

}

.main{

height:auto;

}

.kdsBoard,

.tablesGrid,

.reportCards,

.settingsGrid,

.menuGrid{

grid-template-columns:1fr;

}

.formGrid{

grid-template-columns:1fr;

}

.fullWidth{

grid-column:auto;

}

.topbar{

padding:15px;

}

}
.viewBtn{

background:#2563eb;

color:white;

border:none;

padding:10px;

border-radius:8px;

cursor:pointer;

font-weight:bold;

transition:.2s;

}

.releaseBtn{

background:#dc2626;

color:white;

border:none;

padding:10px;

border-radius:8px;

cursor:pointer;

font-weight:bold;

transition:.2s;

}

.viewBtn:hover,

.releaseBtn:hover{

transform:translateY(-2px);

}
/*=========================================================
LOGIN SCREEN & RBAC
=========================================================*/
#loginScreen{
    position:fixed;
    left:0; top:0; width:100%; height:100%;
    background:#05070f;
    display:flex; justify-content:center; align-items:center;
    z-index:9999999;
}
.loginBox{
    background:#0b0f19; border:1px solid #24304d;
    border-radius:16px; padding:40px; text-align:center;
    width:100%; max-width:350px;
}
.loginBox input{
    width:100%; padding:15px; border-radius:10px;
    border:1px solid #293552; background:#141b2d; color:white;
    font-size:24px; text-align:center; letter-spacing: 8px; margin-bottom: 20px;
}
.roleBadge {
    background:#141b2d; padding:4px 10px; border-radius:20px; 
    font-size:12px; margin-left:10px; vertical-align:middle; 
    color:#c5a880; border:1px solid #c5a880;
}

.occupied{
    background:#92400e;
    color:white;
}

</style>

</head>

function checkEnter(e) {

async function attemptLogin(){
    const pin = document.getElementById("loginPin").value;
    const adminPin = SETTINGS.AdminPIN || "1234"; // Default Admin PIN
    const staffPin = SETTINGS.StaffPIN || "0000"; // Default Staff PIN

if(pin === adminPin){

} else if (pin === staffPin) {

function applyRBAC() {

        document.querySelector('[data-page="reports"]').style.display = "none";

function initializeNavigation(){

function switchPage(page){

    .forEach(item=>{

        item.classList.remove(

        "active"

        );

    });

    document

    .querySelector(

    `[data-page="${page}"]`

    )

    .classList

    .add(

    "active"

    );

    .querySelectorAll(".page")

        "active"

    .getElementById(page)

    "active"

    );

    .getElementById("pageTitle")

    .innerText=

    page.charAt(0)

    .toUpperCase()

    page.slice(1);

}

/*=========================================================

function renderRecentOrders(){
    const box = document.getElementById("recentOrders");

    box.innerHTML = "";
    const orders = (DASHBOARD.orders || []).slice().reverse().slice(0, 5);
    if(orders.length === 0) {

        return;
    }
    orders.forEach(order => {
        box.innerHTML += `
        <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #293552;">
            <div><b>${escapeHTML(order.customer)}</b><br><span>Table ${escapeHTML(order.table)}</span></div>

        </div>`;
    });
}


/*=========================================================
POPULAR ITEMS
=========================================================*/

function renderPopularItems(){
    const box = document.getElementById("popularItems");
    if(!box) return;
    box.innerHTML = "";
    const itemCounts = {};
    (DASHBOARD.orders || []).forEach(order => {
        if(order.status !== 'Cancelled') {
            (order.cart || []).forEach(item => {
                itemCounts[item.name] = (itemCounts[item.name] || 0) + Number(item.qty || 1);
            });
        }
    });
    const items = Object.keys(itemCounts)
        .map(name => ({name, qty: itemCounts[name]}))
        .sort((a,b) => b.qty - a.qty)
        .slice(0, 5);
    if(items.length === 0) {
        box.innerHTML = "<p>No Data.</p>";
        return;
    }
    items.forEach(item => {
        box.innerHTML += `
        <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #293552;">
            <span>${escapeHTML(item.name)}</span><b>${item.qty}</b>
        </div>`;
    });
}

async function printBill(id){
    // Open window immediately to bypass popup blockers
    const win = window.open("", "_blank");

        win.document.open();
        win.document.write(response.html);
        win.document.close();
        win.focus();
        win.print();
    }
    catch(e){
        hideLoader();
        win.close();
        console.error(e);
        error("Printing failed.");
    }
}

/*=========================================================
DOWNLOAD CSV & EXCEL
=========================================================*/
function downloadCSV() {
    if (ORDERS.length === 0) {
        error("No orders to export.");
        return;
    }
    const headers = ["Order ID", "Date", "Customer", "Table", "Total", "Payment Mode", "Status", "Notes"];
    const rows = ORDERS.map(order => [
        order.id,
        formatDate(order.dateTime),
        order.customer,
        order.table,
        order.total,
        order.payment,
        order.status,
        order.notes || ""
    ]);
    // Escape each field: wrap in quotes and double-up internal quotes
    const escapeField = (field) => {
        if (field === null || field === undefined) return '""';
        let str = String(field);
        str = str.replace(/"/g, '""');
        return `"${str}"`;
    };
    const csvContent = [
        headers.map(h => escapeField(h)).join(","),
        ...rows.map(row => row.map(escapeField).join(","))
    ].join("\n");

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", `Restaurant_Report_${today()}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function downloadExcel() {
    // CSV files natively open in Excel cleanly
    downloadCSV();
}

/*=========================================================

=========================================================*/

function filterMenu(){

    const keyword=

    .getElementById(

    )

    .value

    .toLowerCase();

    const category=

    document

    .getElementById(

        "categoryFilter"

    )

    .value;

    FILTERED_MENU=

    MENU.filter(item=>{

        const search=

        item.Name

        .toLowerCase()

        .includes(keyword);

        const cat=

        category==""||

        item.Category==category;

        return search&&cat;

    });

    renderMenuCards();

}

        )

        .value

        .trim(),

        Image:

        document

        "itemImage"

        )

        .value

        .trim()

    };

    if(payload.Name==""){

        error(

        "Enter item name."

        );

        return;

    }

    if(payload.Category==""){

        error(

        "Enter category."

        );

        return;

    }

    if(payload.Price<=0){

        error(

        "Invalid price."

        );

        return;

    }

    showLoader(

    "Saving Item..."

    );

    const response=

    await api(

        "saveMenuItem",

        payload

    );

       hideLoader();

    if(response.success){

        success("Menu Saved");

        // ADD THIS: Log the menu change

        closeMenuModal();


        loadMenu();

=========================================================*/

function calculateOfferPrice(item){

    let price=

    Number(item.Price);

    switch(item.OfferType){

        case "Flat":

            return Math.max(

                0,

                price-

                Number(

                item.OfferValue

                )

            );

        case "Percentage":

        case "Happy Hour":

        case "Special":

            return price-

            (

            price*

            Number(

            item.OfferValue

            )/100

            );

        default:

            return price;

    }

}

/*=========================================================
TIME AGO (Update in dashboard.html)
=========================================================*/
function timeAgo(date, status){
    if(!date) return "-";
    
    // FIX: Change Served status to Eating so staff know table is NOT free yet
    if(status === 'Completed' || status === 'Cancelled') return "Done"; 
    if(status === 'Served') return "Eating";

    const seconds = Math.floor((new Date() - new Date(date)) / 1000);


    if(seconds < 60) return seconds + " sec";
    if(seconds < 3600) return Math.floor(seconds / 60) + " min";
    if(seconds < 86400) return Math.floor(seconds / 3600) + " hr";
    return Math.floor(seconds / 86400) + " day";
}

/*=========================================================
ORDER PRIORITY (Update in dashboard.html)
=========================================================*/
function getPriority(order){
    if(!order.dateTime) return { class: "priorityFresh", text: "🟢 Fresh" };
    
    // FIX: Show eating icon so staff know payment is still pending
    if(order.status === 'Completed' || order.status === 'Cancelled'){
        return { class: "priorityFresh", text: "✅ Done" };
    }
    if(order.status === 'Served'){
        return { class: "priorityFresh", text: "🍽 Eating" };
    }

    const minutes = Math.floor((new Date() - new Date(order.dateTime)) / 60000);


    if(minutes >= 20) return { class: "priorityUrgent", text: "🔴 Urgent" };
    if(minutes >= 10) return { class: "priorityAttention", text: "🟡 Attention" };
    
    return { class: "priorityFresh", text: "🟢 Fresh" };
}

/*=========================================================
  RESTAURANT POS NOTIFICATION SOUND
  Loud, Clear & Attention-Grabbing
=========================================================*/
function playNotification() {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();

        const playTone = (frequency, startTime, duration, volume = 0.9) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = "triangle"; // Bright POS sound
            osc.frequency.setValueAtTime(frequency, startTime);

            osc.connect(gain);
            gain.connect(ctx.destination);

            // Instant attack
            gain.gain.setValueAtTime(0.0001, startTime);
            gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.01);

            // Smooth decay
            gain.gain.exponentialRampToValueAtTime(
                0.0001,
                startTime + duration
            );

            osc.start(startTime);
            osc.stop(startTime + duration + 0.02);
        };

        const t = ctx.currentTime;

        // ===== POS Triple Chime =====
        playTone(1046.5, t,        0.18);   // C6
        playTone(1318.5, t + 0.15, 0.18);   // E6
        playTone(1568.0, t + 0.30, 0.28);   // G6

        // ===== Repeat after a short pause =====
        playTone(1046.5, t + 0.90, 0.18);
        playTone(1318.5, t + 1.05, 0.18);
        playTone(1568.0, t + 1.20, 0.28);

    } catch (e) {
        console.error("Audio playback blocked by browser:", e);
    }
}

/*=========================================================
SAVE SETTINGS
=========================================================*/

async function saveSettings(){

        const payload={
        Name: document.getElementById("setName").value.trim(),
        Tagline: document.getElementById("setTagline").value.trim(),
        Address: document.getElementById("setAddress").value.trim(),
        Phone: document.getElementById("setPhone").value.trim(),
        Logo: document.getElementById("setLogo").value.trim(),
        GST: Number(document.getElementById("setGST").value),
        Currency: document.getElementById("setCurrency").value.trim(),
        UPI: document.getElementById("setUPI").value.trim(),
        WhatsApp: document.getElementById("setWhatsApp").value.trim(),
        ReviewLink: document.getElementById("setReview").value.trim(),
        AutoRefresh: Number(document.getElementById("setRefresh").value),
        PrinterWidth: document.getElementById("setPrinter").value,
        HappyHourEnabled: document.getElementById("setHappyHour").value,
        AdminPIN: document.getElementById("setAdminPin").value.trim(),
        StaffPIN: document.getElementById("setStaffPin").value.trim()
    };



    if(payload.Name==""){

        error(

        "Restaurant name required."

        );

        return;

    }

    showLoader(

    "Saving Settings..."

    );

    const response=

    await api(

        "saveSettings",

        payload

    );

    hideLoader();

    if(response.success){

        SETTINGS=payload;

        success(

        "Settings Saved"

        );

        startAutoRefresh();

        loadRestaurant();

    }

    else{

        error(

        response.message||

        "Unable to save settings."

        );

    }

}
/*=========================================================
CLOSE DAY (RESET)
=========================================================*/
async function closeDay() {
    // SECURITY LAYER 1: Hard check for Admin role
    if(CURRENT_ROLE !== "Admin") {
        error("Unauthorized: Only Admins can close the day.");
        return;
    }
    
    // SECURITY LAYER 2: First Warning
    const confirm1 = confirm("⚠️ WARNING: This will permanently delete all orders from today and reset all tables to Free. Are you sure?");
    if(!confirm1) return;
    
    // SECURITY LAYER 3: Second Warning Reminder
    const confirm2 = confirm("Are you ABSOLUTELY sure? Have you downloaded your Excel/CSV revenue report for today?");
    if(!confirm2) return;

    showLoader("Closing Day & Resetting System...");
    
    const response = await api("closeDay");
    
        hideLoader();

    if(response.success) {
        success("System Reset Successfully for a new day.");
        
        // ADD THIS: Start the new day's log
        addActivity("Day Closed", "Admin triggered a full system reset");
        
        await refreshAll(); // Refreshes the dashboard to show 0 orders
    } else {

        error(response.message || "Failed to reset system.");
    }
}

/*=========================================================
RENDER ACTIVITY
=========================================================*/
function renderActivity(){
    const page = document.getElementById("activity");
    if(!page) return;
    if(!document.getElementById("activityList")){
        page.innerHTML = `
        <div class="sectionHeader">
            <h2>Activity Log</h2>
            <button class="primaryButton" onclick="loadActivity()">Refresh</button>
        </div>
        <div id="activityList"></div>
        `;
    }
    const list = document.getElementById("activityList");
    if(ACTIVITY.length === 0){
        list.innerHTML = "<div class='panel'>No activity found.</div>";
        return;
    }
    let html = "";
    ACTIVITY.forEach(item => {
        html += `
        <div class="activityCard">
            <div class="activityLeft">
                <div class="activityIcon">
                    <i class="${item.icon || 'fa-solid fa-clock'}"></i>
                </div>
                <div>
                    <b>${escapeHTML(item.action)}</b>
                    <div>${escapeHTML(item.details)}</div>
                </div>
            </div>
            <div class="activityTime">${formatDate(item.time)}</div>
        </div>
        `;
    });
    list.innerHTML = html;
}
